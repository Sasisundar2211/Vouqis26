name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://placeholder.example.com
          NEXT_PUBLIC_FREE_REPORT_EXPIRY_DAYS: "30"
          NEXT_PUBLIC_PRO_REPORT_HISTORY_DAYS: "90"
          NEXT_PUBLIC_PRO_PRICE_MONTHLY: "29"
          SUPABASE_SERVICE_KEY: placeholder-service-key
          POLAR_ACCESS_TOKEN: placeholder-polar-token
          POLAR_PRODUCT_ID: placeholder-product-id
          POLAR_WEBHOOK_SECRET: placeholder-webhook-secret
          RESEND_API_KEY: placeholder-resend-key

      - name: Test
        run: npm test
